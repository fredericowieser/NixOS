
# #######################################################################################
# AUTOGENERATED HYPRLAND CONFIG.
# EDIT THIS CONFIG ACCORDING TO THE WIKI INSTRUCTIONS.
# #######################################################################################

# This is an example Hyprland config file.
# Refer to the wiki for more information.
# https://wiki.hypr.land/Configuring/

# Please note not all available settings / options are set here.
# For a full list, see the wiki

# You can split this configuration into multiple files
# Create your files separately and then link them to this file like this:
# source = ~/.config/hypr/myColors.conf


################
### MONITORS ###
################

# See https://wiki.hypr.land/Configuring/Monitors/
# Default monitor settings (from repo, overwritten by updates)
source = ~/.config/hypr/monitors.conf
# Local overrides (your custom settings, survives updates)
source = ~/.config/hypr/monitors-local.conf


################
### XWAYLAND ###
################

# Prevent double-scaling on XWayland apps
xwayland {
    force_zero_scaling = true
}


###################
### MY PROGRAMS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/

# Set programs that you use
$terminal = kitty
$fileManager = thunar
$menu = wofi --show drun
$browser = vivaldi
$music = spotify


#################
### AUTOSTART ###
#################

# Autostart necessary processes (like notifications daemons, status bars, etc.)
# Or execute your favorite apps at launch like this:

exec-once = $terminal
exec-once = waybar
exec-once = hyprpaper
exec-once = swaync
exec-once = nm-applet --indicator
exec-once = blueman-applet
exec-once = wlsunset -l 51.5 -L -0.1
exec-once = ~/.config/hypr/scripts/detect-scaling.sh
exec-once = ~/.config/hypr/scripts/monitor-handler.sh
exec-once = udiskie --tray


#############################
### ENVIRONMENT VARIABLES ###
#############################

# See https://wiki.hypr.land/Configuring/Environment-variables/

env = XCURSOR_SIZE,24
env = XCURSOR_THEME,Adwaita
env = HYPRCURSOR_SIZE,24
env = HYPRCURSOR_THEME,Adwaita

# Dark theme environment variables
env = GTK_THEME,Adwaita:dark
env = QT_QPA_PLATFORMTHEME,qt5ct
env = QT_STYLE_OVERRIDE,Adwaita-Dark
env = QT_AUTO_SCREEN_SCALE_FACTOR,1

# Default browser
env = BROWSER,vivaldi


###################
### PERMISSIONS ###
###################

# See https://wiki.hypr.land/Configuring/Permissions/
# Please note permission changes here require a Hyprland restart and are not applied on-the-fly
# for security reasons

# ecosystem {
#   enforce_permissions = 1
# }

# permission = /usr/(bin|local/bin)/grim, screencopy, allow
# permission = /usr/(lib|libexec|lib64)/xdg-desktop-portal-hyprland, screencopy, allow
# permission = /usr/(bin|local/bin)/hyprpm, plugin, allow


#####################
### LOOK AND FEEL ###
#####################

# Refer to https://wiki.hypr.land/Configuring/Variables/

# https://wiki.hypr.land/Configuring/Variables/#general
general {
    gaps_in = 3
    gaps_out = 8

    border_size = 2

    # Tokyo Night border colors - blue to purple gradient
    col.active_border = rgba(7aa2f7ee) rgba(bb9af7ee) 45deg
    col.inactive_border = rgba(565f89aa)

    # Set to true enable resizing windows by clicking and dragging on borders and gaps
    resize_on_border = true

    # Please see https://wiki.hypr.land/Configuring/Tearing/ before you turn this on
    allow_tearing = false

    layout = dwindle
}

# https://wiki.hypr.land/Configuring/Variables/#decoration
decoration {
    rounding = 6
    rounding_power = 2

    # Change transparency of focused and unfocused windows
    active_opacity = 1.0
    inactive_opacity = 1.0

    shadow {
        enabled = true
        range = 8
        render_power = 2
        color = rgba(1a1b2699)
    }

    # https://wiki.hypr.land/Configuring/Variables/#blur
    blur {
        enabled = true
        size = 4
        passes = 2

        vibrancy = 0.1696
    }
}

# https://wiki.hypr.land/Configuring/Variables/#animations
# Minimal animations - productivity first
animations {
    enabled = yes

    bezier = instant, 0, 0, 1, 1

    # Near-instant transitions
    animation = windows, 1, 1, instant
    animation = windowsOut, 1, 1, instant
    animation = border, 0
    animation = fade, 1, 1, instant
    animation = workspaces, 1, 1, instant
}

# Ref https://wiki.hypr.land/Configuring/Workspace-Rules/
# "Smart gaps" / "No gaps when only"
# uncomment all if you wish to use that.
# workspace = w[tv1], gapsout:0, gapsin:0
# workspace = f[1], gapsout:0, gapsin:0
# windowrule = bordersize 0, floating:0, onworkspace:w[tv1]
# windowrule = rounding 0, floating:0, onworkspace:w[tv1]
# windowrule = bordersize 0, floating:0, onworkspace:f[1]
# windowrule = rounding 0, floating:0, onworkspace:f[1]

# See https://wiki.hypr.land/Configuring/Dwindle-Layout/ for more
dwindle {
    pseudotile = true # Master switch for pseudotiling. Enabling is bound to mainMod + P in the keybinds section below
    preserve_split = true # You probably want this
}

# See https://wiki.hypr.land/Configuring/Master-Layout/ for more
master {
    new_status = master
}

# https://wiki.hypr.land/Configuring/Variables/#misc
misc {
    force_default_wallpaper = 0
    disable_hyprland_logo = true
}


#############
### INPUT ###
#############

# https://wiki.hypr.land/Configuring/Variables/#input
input {
    kb_layout = gb
    kb_variant =
    kb_model =
    kb_options =
    kb_rules =

    follow_mouse = 1

    sensitivity = 0 # -1.0 - 1.0, 0 means no modification.

    touchpad {
        natural_scroll = false
    }
}

# See https://wiki.hypr.land/Configuring/Gestures
gesture = 3, horizontal, workspace

# Example per-device config
# See https://wiki.hypr.land/Configuring/Keywords/#per-device-input-configs for more
device {
    name = epic-mouse-v1
    sensitivity = -0.5
}


###################
### KEYBINDINGS ###
###################

# See https://wiki.hypr.land/Configuring/Keywords/
$mainMod = SUPER # Sets "Windows" key as main modifier

# Mac-like keybindings
bind = $mainMod, Space, exec, $menu           # Launcher
bind = $mainMod, Q, killactive,               # Quit window
bind = $mainMod, T, exec, ~/.config/hypr/scripts/terminal-cwd.sh  # Terminal (inherits cwd)
bind = $mainMod, B, exec, $browser            # Browser
bind = $mainMod, F, exec, $fileManager        # File manager
bind = $mainMod, M, exec, $music              # Music
bind = $mainMod, V, exec, $terminal -e nvim   # Neovim
bind = $mainMod, N, exec, swaync-client -t -sw # Notifications
bind = $mainMod, L, exec, hyprlock              # Lock screen
bind = $mainMod SHIFT, V, togglefloating,     # Toggle float
bind = $mainMod SHIFT, E, exit,               # Exit Hyprland
bind = $mainMod, J, togglesplit, # dwindle

# Screenshot selection to clipboard
bind = $mainMod, P, exec, grim -g "$(slurp)" - | wl-copy

# Monitor scaling cycle (1x -> 1.5x -> 2x)
bind = $mainMod, slash, exec, ~/.config/hypr/scripts/scale-cycle.sh

# Display configurator (nwg-displays, saves to local config)
bind = $mainMod SHIFT, D, exec, ~/.config/hypr/scripts/nwg-displays-wrapper.sh

# Navigate workspaces with SUPER + Left/Right (cycles all 10 with wrap)
bind = $mainMod, right, exec, ~/.config/hypr/scripts/workspace-cycle.sh next
bind = $mainMod, left, exec, ~/.config/hypr/scripts/workspace-cycle.sh prev

# Move focus with mainMod + SHIFT + arrow keys
bind = $mainMod SHIFT, left, movefocus, l
bind = $mainMod SHIFT, right, movefocus, r
bind = $mainMod SHIFT, up, movefocus, u
bind = $mainMod SHIFT, down, movefocus, d

# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Multi-digit workspace switching (SUPER + G then type number)
# Press SUPER+G, then type digits (e.g., 1 then 1 for workspace 11)
bind = $mainMod, G, submap, goto_workspace

submap = goto_workspace
# First digit (tens place) - enters second submap
bind = , 1, submap, goto_1x
bind = , 2, submap, goto_2x
bind = , 3, submap, goto_3x
# Single digits go directly and reset
bind = , 9, exec, ~/.config/hypr/scripts/goto-workspace.sh 9
bind = , 0, exec, ~/.config/hypr/scripts/goto-workspace.sh 10
# Escape to cancel
bind = , escape, submap, reset
submap = reset

# Workspaces 10-19
submap = goto_1x
bind = , 0, exec, ~/.config/hypr/scripts/goto-workspace.sh 10
bind = , 1, exec, ~/.config/hypr/scripts/goto-workspace.sh 11
bind = , 2, exec, ~/.config/hypr/scripts/goto-workspace.sh 12
bind = , 3, exec, ~/.config/hypr/scripts/goto-workspace.sh 13
bind = , 4, exec, ~/.config/hypr/scripts/goto-workspace.sh 14
bind = , 5, exec, ~/.config/hypr/scripts/goto-workspace.sh 15
bind = , 6, exec, ~/.config/hypr/scripts/goto-workspace.sh 16
bind = , 7, exec, ~/.config/hypr/scripts/goto-workspace.sh 17
bind = , 8, exec, ~/.config/hypr/scripts/goto-workspace.sh 18
bind = , 9, exec, ~/.config/hypr/scripts/goto-workspace.sh 19
bind = , escape, submap, reset
submap = reset

# Workspaces 20-29
submap = goto_2x
bind = , 0, exec, ~/.config/hypr/scripts/goto-workspace.sh 20
bind = , 1, exec, ~/.config/hypr/scripts/goto-workspace.sh 21
bind = , 2, exec, ~/.config/hypr/scripts/goto-workspace.sh 22
bind = , 3, exec, ~/.config/hypr/scripts/goto-workspace.sh 23
bind = , 4, exec, ~/.config/hypr/scripts/goto-workspace.sh 24
bind = , 5, exec, ~/.config/hypr/scripts/goto-workspace.sh 25
bind = , 6, exec, ~/.config/hypr/scripts/goto-workspace.sh 26
bind = , 7, exec, ~/.config/hypr/scripts/goto-workspace.sh 27
bind = , 8, exec, ~/.config/hypr/scripts/goto-workspace.sh 28
bind = , 9, exec, ~/.config/hypr/scripts/goto-workspace.sh 29
bind = , escape, submap, reset
submap = reset

# Workspaces 30-39
submap = goto_3x
bind = , 0, exec, ~/.config/hypr/scripts/goto-workspace.sh 30
bind = , 1, exec, ~/.config/hypr/scripts/goto-workspace.sh 31
bind = , 2, exec, ~/.config/hypr/scripts/goto-workspace.sh 32
bind = , 3, exec, ~/.config/hypr/scripts/goto-workspace.sh 33
bind = , 4, exec, ~/.config/hypr/scripts/goto-workspace.sh 34
bind = , 5, exec, ~/.config/hypr/scripts/goto-workspace.sh 35
bind = , 6, exec, ~/.config/hypr/scripts/goto-workspace.sh 36
bind = , 7, exec, ~/.config/hypr/scripts/goto-workspace.sh 37
bind = , 8, exec, ~/.config/hypr/scripts/goto-workspace.sh 38
bind = , 9, exec, ~/.config/hypr/scripts/goto-workspace.sh 39
bind = , escape, submap, reset
submap = reset

# Example special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1

# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow

# Laptop multimedia keys for volume and LCD brightness
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 1 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4 -n2 set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4 -n2 set 5%-

# Requires playerctl
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous

##############################
### WINDOWS AND WORKSPACES ###
##############################

# See https://wiki.hypr.land/Configuring/Window-Rules/ for more
# See https://wiki.hypr.land/Configuring/Workspace-Rules/ for workspace rules

# Example windowrule
# windowrule = float,class:^(kitty)$,title:^(kitty)$

# Ignore maximize requests from apps. You'll probably like this.
windowrule = suppressevent maximize, class:.*

# Fix some dragging issues with XWayland
windowrule = nofocus,class:^$,title:^$,xwayland:1,floating:1,fullscreen:0,pinned:0


###################
### LAYER RULES ###
###################

# Blur effects for notification center
layerrule = blur, swaync-control-center
layerrule = blur, swaync-notification-window
layerrule = ignorezero, swaync-control-center
layerrule = ignorezero, swaync-notification-window

# Blur effects for wofi
layerrule = blur, wofi
layerrule = ignorezero, wofi
