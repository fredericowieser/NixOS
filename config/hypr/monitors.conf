# Multi-Monitor Configuration (DEFAULTS)
# This file contains default settings - DO NOT EDIT for local customizations
# Use ~/.config/hypr/monitors-local.conf instead (survives updates)

# Laptop/internal display anchored at origin
monitor = eDP-1, preferred, 0x0, auto
monitor = eDP-2, preferred, 0x0, auto

# External displays default to the RIGHT (easier to see in nwg-displays)
# Use nwg-displays (SUPER+SHIFT+D) to rearrange, then save to monitors-local.conf
monitor = , preferred, auto-right, auto

# --- MACHINE-SPECIFIC OVERRIDES ---
# Uncomment and customize for your specific setup
# Use `hyprctl monitors` to find monitor names (e.g., eDP-1, DP-1, HDMI-A-1)

# Example: 4K external at 1.5x scaling, above laptop
# monitor = DP-1, 3840x2160@60, auto-up, 1.5

# Example: External to the right instead of above
# monitor = HDMI-A-1, preferred, auto-right, 1

# Example: Triple monitor (center primary, others left/right)
# monitor = DP-1, 1920x1080@144, 0x0, 1
# monitor = DP-2, 1920x1080@60, -1920x0, 1
# monitor = DP-3, 1920x1080@60, 1920x0, 1

# Example: Disable laptop screen when lid closed
# monitor = eDP-1, disable

# Example: Portrait mode monitor
# monitor = DP-2, 1920x1080@60, auto-up, 1, transform, 1

# --- WORKSPACE BINDINGS ---
# Workspaces are assigned DYNAMICALLY by monitor-handler.sh:
# - Laptop (eDP-*): workspaces 1-8
# - First external monitor: 9-12
# - Second external monitor: 13-16
# - Third external monitor: 17-20
# - etc.
#
# This happens automatically when monitors are connected/disconnected.
