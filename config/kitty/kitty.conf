# Tokyo Night Kitty Configuration

# Font
font_family      JetBrainsMono Nerd Font
bold_font        auto
italic_font      auto
bold_italic_font auto
font_size        11.0

# Cursor
cursor_shape beam
cursor_blink_interval 0
cursor_beam_thickness 1.5

# Window
window_padding_width 8
hide_window_decorations yes
confirm_os_window_close 0
background_opacity 1.0

# Tab bar
tab_bar_style powerline
tab_powerline_style slanted
tab_bar_edge bottom

# Scrollback
scrollback_lines 10000

# URLs
url_style curly
open_url_with default

# Bell
enable_audio_bell no
visual_bell_duration 0.0

# Tokyo Night Color Scheme
foreground #c0caf5
background #1a1b26
selection_foreground #c0caf5
selection_background #33467c

# Cursor colors
cursor #c0caf5
cursor_text_color #1a1b26

# URL underline color
url_color #7aa2f7

# Tab bar colors
active_tab_foreground   #1a1b26
active_tab_background   #7aa2f7
inactive_tab_foreground #565f89
inactive_tab_background #1a1b26
tab_bar_background      #1a1b26

# Normal colors
color0  #15161e
color1  #f7768e
color2  #9ece6a
color3  #e0af68
color4  #7aa2f7
color5  #bb9af7
color6  #7dcfff
color7  #a9b1d6

# Bright colors
color8  #414868
color9  #f7768e
color10 #9ece6a
color11 #e0af68
color12 #7aa2f7
color13 #bb9af7
color14 #7dcfff
color15 #c0caf5

# Extended colors
mark1_foreground #1a1b26
mark1_background #7aa2f7
mark2_foreground #1a1b26
mark2_background #9ece6a
mark3_foreground #1a1b26
mark3_background #f7768e
